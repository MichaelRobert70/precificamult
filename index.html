<!DOCTYPE html>

  <head>

    <title>PrecificaMulti - Calculadora de E-commerce</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
      }
      
      /* Remove as setas de incremento/decremento dos inputs number */
      input[type=number]::-webkit-inner-spin-button, 
      input[type=number]::-webkit-outer-spin-button { 
        -webkit-appearance: none; 
        margin: 0; 
      }
      input[type=number] {
        -moz-appearance: textfield;
      }
    </style>
    <script>
      // Protect window.fetch from being overwritten by polyfills that crash the app in this environment
      (function() {
        try {
          const originalFetch = window.fetch;
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch') || 
                             Object.getOwnPropertyDescriptor(Object.getPrototypeOf(window), 'fetch');
          
          if (descriptor && descriptor.configurable) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { console.warn('Blocked attempt to overwrite window.fetch'); },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {}

        // Protect globalThis.fetch
        if (typeof globalThis !== 'undefined') {
          try {
            const originalFetch = globalThis.fetch;
            const descriptor = Object.getOwnPropertyDescriptor(globalThis, 'fetch');
            if (!descriptor || descriptor.configurable) {
              Object.defineProperty(globalThis, 'fetch', {
                get: function() { return originalFetch; },
                set: function(v) { console.warn('Blocked globalThis.fetch overwrite attempt'); },
                configurable: true,
                enumerable: true
              });
            }
          } catch (e) {}
        }

        // Polyfill global for libraries that expect it and protect its fetch property
        if (typeof window.global === 'undefined') {
          window.global = new Proxy(window, {
            set(target, prop, value) {
              if (prop === 'fetch') {
                console.warn('Blocked attempt to overwrite window.global.fetch');
                return true; 
              }
              try {
                target[prop] = value;
              } catch (e) {}
              return true;
            },
            get(target, prop) {
              if (prop === 'global') return window.global;
              return target[prop];
            }
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
